    ::-webkit-scrollbar-thumb:hover { background: #3a4055; }
    input:focus { outline: none; }
    input[type=range] { accent-color: #00e5ff; }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pop      { 0%,100%{transform:scale(1)} 40%{transform:scale(1.3)} 70%{transform:scale(0.9)} }
    @keyframes kudosPop { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
  </style>
</head>

// Weekly Score = 40% Consistency + 30% Quality Execution + 20% Aerobic Efficiency + 10% Recovery Compliance
const LEADERBOARD = [
  { rank:1, name:'Alex Rivera',   initials:'AR', sport:'Triathlon', score:92, consistency:96, quality:91, aerobic:90, recovery:88, g1:C.purple, g2:C.accent, delta:'+4'  },
  { rank:2, name:'Sarah Chen',    initials:'SC', sport:'Cycling',   score:87, consistency:91, quality:86, aerobic:83, recovery:79, g1:C.orange, g2:C.purple, delta:'+2'  },
  { rank:3, name:'Tom Bradley',   initials:'TB', sport:'Swimming',  score:82, consistency:85, quality:81, aerobic:80, recovery:76, g1:C.accent, g2:C.purple, delta:'+6'  },
  { rank:4, name:'You',           initials:'JD', sport:'Triathlon', score:76, consistency:78, quality:75, aerobic:76, recovery:70, isMe:true,                delta:'+1'  },
  { rank:5, name:'Marcus Webb',   initials:'MW', sport:'Triathlon', score:70, consistency:72, quality:69, aerobic:70, recovery:64, g1:C.accent, g2:C.green,  delta:'-3'  },

const DISCOVER = [
  { name:'Emma Collins',  initials:'EC', sport:'Running',   stat:'3:58 /km',  statLabel:'pace',  followers:142, g1:C.purple, g2:C.green  },
  { name:'Alex Rivera',   initials:'AR', sport:'Triathlon', stat:'340w',      statLabel:'FTP',   followers:891, g1:C.purple, g2:C.accent },

const ACTIVE_STRIP = [
  { name:'Sarah Chen',   initials:'SC', g1:C.orange, g2:C.purple, wtype:'ride' },
  { name:'Marcus Webb',  initials:'MW', g1:C.accent, g2:C.green,  wtype:'run'  },
  { name:'Alex Rivera',  initials:'AR', g1:C.purple, g2:C.accent, wtype:'brick'},
  { name:'Priya Nair',   initials:'PN', g1:C.green,  g2:C.accent, wtype:'run'  },
  { name:'Tom Bradley',  initials:'TB', g1:C.accent, g2:C.purple, wtype:'swim' },
  { name:'Emma Collins', initials:'EC', g1:C.purple, g2:C.green,  wtype:'run'  },
  { name:'Jack Morrison',initials:'JM', g1:C.orange, g2:C.green,  wtype:'ride' },
]

// ── Avatar ─────────────────────────────────────────────────────────────────────
function Avatar({ initials, g1, g2, size=36, isMe=false }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%', flexShrink:0,
      background: isMe
        ? `linear-gradient(135deg, ${C.accent}, ${C.purple})`
        : `linear-gradient(135deg, ${g1}, ${g2})`,
      display:'flex', alignItems:'center', justifyContent:'center',
      fontSize: Math.round(size * 0.38), fontWeight:700,
      color: isMe ? '#000' : '#000',
    }}>{initials}</div>
  )
}

// ── Sidebar ────────────────────────────────────────────────────────────────────
const navItems = [
  { path:'dashboard', icon:'◈', label:'Dashboard'      },
  { path:'calendar',  icon:'⊞', label:'Calendar'       },
  { path:'analytics', icon:'∿', label:'Analytics'      },
  { path:'ai-coach',  icon:'✦', label:'AI Coach'       },
  { path:'plans',     icon:'≡', label:'Training Plans' },
  { path:'library',   icon:'⊙', label:'Workout Library'},
  { path:'nutrition', icon:'◉', label:'Nutrition'      },
  { path:'social',    icon:'⊛', label:'Social'         },
]
function Sidebar() {
  return (
    <div style={{ width:220, flexShrink:0, background:C.surface, borderRight:`1px solid ${C.border}`, display:'flex', flexDirection:'column', padding:'24px 0', height:'100vh', position:'sticky', top:0 }}>
      <div style={{ padding:'0 20px 28px' }}>
        <div style={{ fontSize:20, fontWeight:900, letterSpacing:'0.08em' }}>
          <span style={{ color:C.accent }}>VEX</span><span style={{ color:C.text }}>R</span>
        </div>
        <div style={{ fontSize:10, color:C.muted, letterSpacing:'0.12em', marginTop:2 }}>TRAIN. TRACK. PERFORM.</div>
      </div>
      <div style={{ margin:'0 12px 24px', background:C.card, borderRadius:10, padding:'12px 14px', border:`1px solid ${C.border}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <Avatar initials="JD" g1={C.accent} g2={C.purple} isMe />
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:C.text }}>Jamie Doe</div>
            <div style={{ fontSize:10, color:C.muted }}>triathlon</div>
          </div>
        </div>
        <div style={{ marginTop:12, padding:'8px 10px', background:C.bg, borderRadius:6, display:'flex', justifyContent:'space-between' }}>
          {[['285','FTP',C.accent],['4:28','PACE',C.green],['1:24','CSS',C.purple]].map(([v,l,col],i,arr)=>(
            <React.Fragment key={l}>
              <div style={{ textAlign:'center' }}>
                <div style={{ fontSize:14, fontWeight:800, color:col, fontFamily:'DM Mono,monospace' }}>{v}</div>
                <div style={{ fontSize:9, color:C.muted, letterSpacing:'0.08em' }}>{l}</div>
              </div>
              {i<arr.length-1 && <div style={{ width:1, background:C.border }} />}
            </React.Fragment>
          ))}
        </div>
      </div>
      {navItems.map(item=>{
        const active = item.path==='social'
        return (
          <button key={item.path} style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 20px', background:active?C.accentDim:'transparent', border:'none', borderLeft:`3px solid ${active?C.accent:'transparent'}`, color:active?C.accent:C.muted, fontSize:13, fontWeight:600, cursor:'pointer', transition:'all 0.15s', textAlign:'left', width:'100%', fontFamily:'Inter,sans-serif' }}>
            <span style={{ fontSize:16 }}>{item.icon}</span>{item.label}
          </button>
        )
      })}
      <div style={{ marginTop:'auto', padding:'0 12px', display:'flex', flexDirection:'column', gap:8 }}>
        <button style={{ width:'100%', padding:12, background:C.accent, border:'none', borderRadius:10, color:'#000', fontSize:13, fontWeight:700, cursor:'pointer', fontFamily:'Inter,sans-serif' }}>+ Log Workout</button>
        <button style={{ width:'100%', padding:'9px 14px', background:'none', border:`1px solid ${C.border}`, borderRadius:8, color:C.muted, fontSize:12, fontWeight:600, cursor:'pointer', textAlign:'left', fontFamily:'Inter,sans-serif' }}>Sign out</button>
      </div>
    </div>
  )
}

// ── Map placeholder ────────────────────────────────────────────────────────────
function MapPlaceholder({ color, id }) {
  const pid = `sp${id}`
  return (
    <div style={{ height:130, background:C.subtle, borderRadius:9, overflow:'hidden', position:'relative', margin:'14px 0' }}>
      <svg width="100%" height="100%" style={{ position:'absolute', inset:0 }} preserveAspectRatio="none">
        <defs>
          <pattern id={pid} width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(40)">
            <rect width="20" height="20" fill={C.subtle} />
            <rect width="0.8" height="20" fill={C.border} />
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#${pid})`} />
      </svg>
      <svg width="100%" height="100%" style={{ position:'absolute', inset:0 }} viewBox="0 0 600 130" preserveAspectRatio="none">
        <path
          d="M 10,100 C 60,80 90,40 150,55 S 250,25 310,45 S 410,75 470,35 S 550,15 590,40"
          stroke={color} strokeWidth="2.5" fill="none" strokeLinecap="round"
          style={{ filter:`drop-shadow(0 0 5px ${color}80)` }} opacity="0.75"
        />
        <circle cx="10" cy="100" r="4" fill={color} opacity="0.9" />
        <circle cx="590" cy="40" r="4" fill={color} opacity="0.9" />
      </svg>
      <div style={{ position:'absolute', top:8, right:8, background:C.card+'cc', borderRadius:5, padding:'3px 8px', fontSize:9, color:C.muted, letterSpacing:'0.06em', textTransform:'uppercase' }}>GPS Route</div>
    </div>
  )
}

// ── Activity Card ──────────────────────────────────────────────────────────────
function ActivityCard({ activity, state, dispatch, showMap, compact }) {
  const { id, type, athlete, title, timeAgo, stats, note } = activity
  const { kudosCount, kudosGiven, showComments, comments, commentInput, following } = state
  const sport = wt[type]
  const inputRef = useRef(null)

  const toggleKudos = () => dispatch({ type:'KUDOS', id })
  const toggleComments = () => dispatch({ type:'TOGGLE_COMMENTS', id })
  const submitComment = () => {
    if (!commentInput.trim()) return
    dispatch({ type:'ADD_COMMENT', id, text: commentInput.trim() })
  }

  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:13, overflow:'hidden', marginBottom:16, animation:'fadeUp 0.3s ease' }}>
      {/* top accent */}
      <div style={{ height:2, background:sport.color, opacity:0.7 }} />

      {/* header */}
      <div style={{ display:'flex', alignItems:'center', gap:11, padding:compact?'12px 16px':'15px 18px' }}>
        <Avatar initials={athlete.initials} g1={athlete.g1} g2={athlete.g2} size={40} />
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:7 }}>
            <span style={{ fontSize:13, fontWeight:700, color:C.text }}>{athlete.name}</span>
            <span style={{ fontSize:10, background:sport.color+'20', color:sport.color, borderRadius:4, padding:'2px 6px', fontWeight:700, letterSpacing:'0.04em' }}>
              {sport.icon} {sport.label}
            </span>
          </div>
          <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{timeAgo}</div>
        </div>
        {!following ? (
          <button
            onClick={() => dispatch({ type:'FOLLOW', id })}
            style={{ background:C.accent+'15', border:`1px solid ${C.accent}55`, borderRadius:7, padding:'5px 11px', color:C.accent, fontSize:11, fontWeight:700, cursor:'pointer', fontFamily:'Inter,sans-serif', transition:'all 0.15s', flexShrink:0 }}
            onMouseEnter={e=>{ e.currentTarget.style.background=C.accent+'28' }}
            onMouseLeave={e=>{ e.currentTarget.style.background=C.accent+'15' }}
          >Follow</button>
        ) : (
          <button
            onClick={() => dispatch({ type:'FOLLOW', id })}
            style={{ background:'none', border:`1px solid ${C.border}`, borderRadius:7, padding:'5px 11px', color:C.muted, fontSize:11, cursor:'pointer', fontFamily:'Inter,sans-serif', transition:'all 0.15s', flexShrink:0 }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor=C.muted }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor=C.border }}
          >Following</button>
        )}
      </div>

      {/* workout title */}
      <div style={{ padding: compact ? '0 16px 10px' : '0 18px 12px' }}>
        <div style={{ fontSize:15, fontWeight:800, color:C.text, letterSpacing:'-0.02em' }}>{title}</div>
        {note && (
          <div style={{ fontSize:12, color:C.muted, marginTop:5, lineHeight:1.55, fontStyle:'italic', borderLeft:`2px solid ${C.subtle}`, paddingLeft:10 }}>{note}</div>
        )}
      </div>

      {/* map */}
      {showMap && (
        <div style={{ paddingInline: compact ? 16 : 18 }}>
          <MapPlaceholder color={sport.color} id={id} />
        </div>
      )}

      {/* stats */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:0, borderTop:`1px solid ${C.border}`, borderBottom:`1px solid ${C.border}` }}>
        {stats.map((s,i)=>(
          <div key={i} style={{ padding:compact?'10px 14px':'12px 16px', textAlign:'center', borderRight: i<3?`1px solid ${C.border}`:'none' }}>
            <div style={{ fontSize:15, fontWeight:800, color:C.text, fontFamily:'DM Mono,monospace', letterSpacing:'-0.02em', lineHeight:1 }}>
              {s.value}<span style={{ fontSize:10, color:C.muted, fontFamily:'Inter,sans-serif', fontWeight:500, marginLeft:2 }}>{s.unit}</span>
            </div>
            <div style={{ fontSize:9, color:C.muted, marginTop:3, letterSpacing:'0.06em', textTransform:'uppercase' }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* actions */}
      <div style={{ display:'flex', alignItems:'center', padding:'10px 14px', gap:4 }}>
        {/* Kudos */}
        <button
          onClick={toggleKudos}
          style={{
            display:'flex', alignItems:'center', gap:6,
            padding:'7px 12px', borderRadius:8,
            background: kudosGiven ? sport.color+'18' : 'none',
            border: `1px solid ${kudosGiven ? sport.color+'60' : C.border}`,
            color: kudosGiven ? sport.color : C.muted,
            fontSize:12, fontWeight:700, cursor:'pointer',
            fontFamily:'Inter,sans-serif', transition:'all 0.15s',
          }}
          onMouseEnter={e=>{ if(!kudosGiven){ e.currentTarget.style.borderColor=C.muted; e.currentTarget.style.color=C.text }}}
          onMouseLeave={e=>{ if(!kudosGiven){ e.currentTarget.style.borderColor=C.border; e.currentTarget.style.color=C.muted }}}
        >
          <span style={{ fontSize:14, display:'inline-block', animation: kudosGiven ? 'pop 0.35s ease' : 'none' }}>💪</span>
          <span style={{ fontFamily:'DM Mono,monospace' }}>{kudosCount}</span>
        </button>

        {/* Comment */}
        <button
          onClick={toggleComments}
          style={{
            display:'flex', alignItems:'center', gap:6,
            padding:'7px 12px', borderRadius:8,
            background: showComments ? C.accentDim : 'none',
            border: `1px solid ${showComments ? C.accent+'50' : C.border}`,
            color: showComments ? C.accent : C.muted,
            fontSize:12, fontWeight:700, cursor:'pointer',
            fontFamily:'Inter,sans-serif', transition:'all 0.15s',
          }}
          onMouseEnter={e=>{ if(!showComments){ e.currentTarget.style.borderColor=C.muted; e.currentTarget.style.color=C.text }}}
          onMouseLeave={e=>{ if(!showComments){ e.currentTarget.style.borderColor=C.border; e.currentTarget.style.color=C.muted }}}
        >
          <span style={{ fontSize:13 }}>💬</span>
          <span style={{ fontFamily:'DM Mono,monospace' }}>{comments.length}</span>
        </button>

        {/* Segment compare — decorative */}
        <button style={{
          display:'flex', alignItems:'center', gap:6,
          padding:'7px 12px', borderRadius:8, marginLeft:'auto',
          background:'none', border:`1px solid ${C.border}`,
          color:C.muted, fontSize:12, fontWeight:600, cursor:'pointer',
          fontFamily:'Inter,sans-serif', transition:'all 0.15s',
        }}
          onMouseEnter={e=>{ e.currentTarget.style.borderColor=C.muted; e.currentTarget.style.color=C.text }}
          onMouseLeave={e=>{ e.currentTarget.style.borderColor=C.border; e.currentTarget.style.color=C.muted }}
        >
          <span style={{ fontSize:11 }}>⟁</span> Segments
        </button>

        {/* Share */}
        <button style={{
          display:'flex', alignItems:'center', gap:5,
          padding:'7px 11px', borderRadius:8,
          background:'none', border:`1px solid ${C.border}`,
          color:C.muted, fontSize:12, cursor:'pointer',
          fontFamily:'Inter,sans-serif', transition:'all 0.15s',
        }}
          onMouseEnter={e=>{ e.currentTarget.style.borderColor=C.muted; e.currentTarget.style.color=C.text }}
          onMouseLeave={e=>{ e.currentTarget.style.borderColor=C.border; e.currentTarget.style.color=C.muted }}
        >↗</button>
      </div>

      {/* Comments section */}
      {showComments && (
        <div style={{ borderTop:`1px solid ${C.border}`, padding:'12px 16px', display:'flex', flexDirection:'column', gap:10 }}>
          {comments.map((c,i)=>(
            <div key={i} style={{ display:'flex', gap:9, alignItems:'flex-start' }}>

// ── Leaderboard ────────────────────────────────────────────────────────────────
function ScoreGrade(score) {
  if (score >= 90) return { label:'Elite',    color:'#FFD700' }
  if (score >= 80) return { label:'Advanced', color: C.green  }
  if (score >= 70) return { label:'Solid',    color: C.accent }
  if (score >= 55) return { label:'Building', color: C.orange }
  return                   { label:'Beginner',color: C.muted  }
}

// ── Reducer ────────────────────────────────────────────────────────────────────
function initCardStates() {
  return Object.fromEntries(ACTIVITIES.map(a => [a.id, {
    kudosCount:  a.kudosCount,
    kudosGiven:  false,
    showComments:false,
    comments:    a.comments,
    commentInput:'',
    following:   a.following,
  }]))
}

function reducer(state, action) {
  const s = state[action.id]
  switch (action.type) {
    case 'KUDOS':
      return { ...state, [action.id]: { ...s, kudosGiven: !s.kudosGiven, kudosCount: s.kudosGiven ? s.kudosCount-1 : s.kudosCount+1 } }
    case 'TOGGLE_COMMENTS':
      return { ...state, [action.id]: { ...s, showComments: !s.showComments } }
    case 'COMMENT_INPUT':
      return { ...state, [action.id]: { ...s, commentInput: action.text } }
    case 'ADD_COMMENT':
      return { ...state, [action.id]: { ...s, commentInput: '', comments: [...s.comments, { author:'You', initials:'JD', g1:C.accent, g2:C.purple, text:action.text, time:'Just now' }] } }
    case 'FOLLOW':
      return { ...state, [action.id]: { ...s, following: !s.following } }
    default:
      return state
  }
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS)
  const [tweaksVisible, setTweaksVisible] = useState(false)
  const [tab, setTab] = useState('feed')
  const [cardStates, dispatch] = React.useReducer(reducer, null, initCardStates)

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVisible(true)
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false)
    }
    window.addEventListener('message', handler)
    window.parent.postMessage({ type:'__edit_mode_available' }, '*')
    return () => window.removeEventListener('message', handler)
  }, [])

  useEffect(() => {
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:tweaks }, '*')
  }, [tweaks])

  const tabs = [
    { key:'feed',        label:'Feed'        },
    { key:'leaderboard', label:'Leaderboard' },
    { key:'discover',    label:'Discover'    },
  ]

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar />
      <div style={{ flex:1, overflow:'auto', padding:'28px 32px', minWidth:0 }}>

        {/* Page header */}
        <div style={{ marginBottom:22 }}>
          <div style={{ fontSize:28, fontWeight:900, color:C.text, letterSpacing:'-0.03em', lineHeight:1.1 }}>Social</div>
          <div style={{ fontSize:13, color:C.muted, marginTop:5, fontWeight:500 }}>Your training community</div>
        </div>

        {/* Tabs */}
        <div style={{ display:'flex', gap:4, marginBottom:24, borderBottom:`1px solid ${C.border}`, paddingBottom:0 }}>
          {tabs.map(t=>{
            const active = tab===t.key
            return (
              <button
                key={t.key}
                onClick={()=>setTab(t.key)}
                style={{
                  padding:'9px 18px', background:'none', border:'none',
                  borderBottom:`2px solid ${active?C.accent:'transparent'}`,
                  color: active?C.accent:C.muted,
                  fontSize:13, fontWeight:700, cursor:'pointer',
                  fontFamily:'Inter,sans-serif', transition:'all 0.15s',
                  marginBottom:-1,
                }}
                onMouseEnter={e=>{ if(!active) e.currentTarget.style.color=C.text }}
                onMouseLeave={e=>{ if(!active) e.currentTarget.style.color=C.muted }}
              >{t.label}</button>
            )
          })}
        </div>

        {tab === 'feed' && (
          <div style={{ maxWidth:640 }}>
            {tweaks.showActiveStrip && <ActiveStrip />}
            {ACTIVITIES.map(a=>(
              <ActivityCard
                key={a.id}
                activity={a}
                state={cardStates[a.id]}
                dispatch={dispatch}
                showMap={tweaks.showMapPreview}
                compact={tweaks.compactCards}
              />
            ))}
          </div>
        )}

        {tab === 'leaderboard' && (
          <div style={{ maxWidth:680 }}>
            <LeaderboardTab />
          </div>
        )}

        {tab === 'discover' && (
          <div style={{ maxWidth:640 }}>
            <DiscoverTab />
          </div>
        )}

      </div>

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
