<script type="text/babel">
const { useState, useEffect } = React

const C = {

  accent:'#00e5ff', accentDim:'#00e5ff22',
  green:'#00ff9d', orange:'#ff6b2b', purple:'#a855f7',
  text:'#e8edf5', muted:'#5a6478', subtle:'#2a3040',
}
const yellow = '#f5c518'

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "chartDays": 7,
  "showDriftTracking": true,
  "showAdaptiveProfile": true
}/*EDITMODE-END*/

// ── Data ──────────────────────────────────────────────────────────────────────
const HRV_14 = [72,70,68,71,66,64,66,68,65,63,62,61,61,61]
const HRV_7  = HRV_14.slice(-7)
const HRV_BASELINE = 68

const RHR_14 = [44,44,43,45,46,46,45,44,46,47,47,47,47,47]
const RHR_7  = RHR_14.slice(-7)
const RHR_BASELINE = 44

const SLEEP_7 = [7.33,8.08,6.83,7.25,5.75,7.5,6.9]
const SLEEP_BASELINE = 7.3

const ACUTE_TSS = 285
const CHRONIC_TSS = 223
const AC_RATIO = parseFloat((ACUTE_TSS / CHRONIC_TSS).toFixed(2))

const ADAPTIVE_PROFILE = [
  { type:'VO2 Intervals',    recovery:'36–48h',  conf:'High',   note:'Consistent 12–15% HRV drop post-session. Full recovery in ~40h.' },
  { type:'Long Ride (>3h)',  recovery:'24h',     conf:'High',   note:'Moderate load. RHR normalises overnight; HRV recovers by morning.' },
  { type:'Long Run (>90m)',  recovery:'36h',     conf:'Medium', note:'Higher relative loading than equivalent ride. Watch sleep quality.' },
  { type:'Race / Key Block', recovery:'48–72h',  conf:'Low',    note:'Insufficient data — 2 samples. Building profile over next 4 weeks.' },
]

const DRIFT_HRV  = [64,65,65,66,65,67,67,68] // 8-week baseline HRV trend
const DRIFT_RHR  = [46,46,45,45,44,44,44,43] // 8-week baseline RHR
const DRIFT_WEEKS = ['W1','W2','W3','W4','W5','W6','W7','W8']

// ── Readiness logic ───────────────────────────────────────────────────────────
function computeReadiness(fatigueInput) {
  const hrvDev = (HRV_14[HRV_14.length-1] - HRV_BASELINE) / HRV_BASELINE * 100
  const rhrDev = RHR_14[RHR_14.length-1] - RHR_BASELINE
  const sleepDev = SLEEP_7[SLEEP_7.length-1] - SLEEP_BASELINE
  let score = 0
  if (hrvDev < -15) score += 3; else if (hrvDev < -8) score += 2; else if (hrvDev < -3) score += 1
  if (rhrDev > 4) score += 2; else if (rhrDev > 2) score += 1
  if (sleepDev < -1) score += 2; else if (sleepDev < -0.5) score += 1
  if (AC_RATIO > 1.4) score += 2; else if (AC_RATIO > 1.25) score += 1
  score += (fatigueInput - 3) * 0.8
  if (score >= 6) return 'rest'
  if (score >= 3) return 'modify'
  return 'go'
}

const READINESS_META = {
  go:     { label:'TRAIN NORMALLY',  emoji:'🟢', color:C.green,  bg:C.green+'12',  border:C.green+'35',
            summary:'Recovery markers are tracking well. Execute your planned session at full intensity.' },
  modify: { label:'MODIFY SESSION',  emoji:'🟡', color:yellow,   bg:yellow+'12',   border:yellow+'35',
            summary:'HRV suppression and elevated RHR indicate residual fatigue. Reduce intensity or duration by 20–30%.' },
  rest:   { label:'REST TODAY',      emoji:'🔴', color:C.orange, bg:C.orange+'12', border:C.orange+'35',
            summary:'Multiple stress indicators are elevated. Full rest or 20–30 min easy walk only — no structured training.' },
}

const TRAINING_RECS = {
  go:     [
    { label:'Today',   text:'Execute planned session at full intensity.' },
    { label:'Monitor', text:'Log HRV tomorrow — confirm recovery holds after session.' },
  ],
  modify: [
    { label:'Option A', text:'Zone 2 aerobic only — 60–75 min, HR cap at 140bpm.' },
    { label:'Option B', text:'Short aerobic flush — 40 min easy + mobility work.' },
    { label:'Avoid',   text:'No intensity above Z2. No intervals or threshold work.' },
  ],

    { label:'Today',   text:'Full rest or 20–30 min easy walk. No structured training.' },
    { label:'Tomorrow',text:'Re-assess HRV on waking. Do not resume intensity until HRV recovers >5% toward baseline.' },
    { label:'Avoid',   text:'Avoid the temptation to "make up" missed load — it extends suppression.' },
  ],
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
const navItems = [
  { path:'dashboard', icon:'◈', label:'Dashboard'       },
  { path:'calendar',  icon:'⊞', label:'Calendar'        },
  { path:'analytics', icon:'∿', label:'Analytics'       },
  { path:'ai-coach',  icon:'✦', label:'AI Coach'        },
  { path:'plans',     icon:'≡', label:'Training Plans'  },
  { path:'library',   icon:'⊙', label:'Workout Library' },
  { path:'nutrition', icon:'◉', label:'Nutrition'       },
  { path:'social',    icon:'⊛', label:'Social'          },
  { path:'health',    icon:'♡', label:'Health'          },
]

      <div style={{ padding:'0 20px 28px' }}>
        <div style={{ fontSize:20, fontWeight:900, letterSpacing:'0.08em' }}>
          <span style={{ color:C.accent }}>VEX</span><span style={{ color:C.text }}>R</span>
        </div>
        <div style={{ fontSize:10, color:C.muted, letterSpacing:'0.12em', marginTop:2 }}>TRAIN. TRACK. PERFORM.</div>
      </div>
      <div style={{ margin:'0 12px 24px', background:C.card, borderRadius:10, padding:'12px 14px', border:`1px solid ${C.border}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:36, height:36, borderRadius:'50%', background:`linear-gradient(135deg,${C.accent},${C.purple})`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, fontWeight:700, color:'#000' }}>JD</div>

        <button style={{ width:'100%', padding:'9px 14px', background:'none', border:`1px solid ${C.border}`, borderRadius:8, color:C.muted, fontSize:12, fontWeight:600, cursor:'pointer', textAlign:'left', fontFamily:'Inter,sans-serif' }}>Sign out</button>
      </div>

  )
}

// ── Section label ─────────────────────────────────────────────────────────────
const SL = ({ children }) => <div style={{ fontSize:11, fontWeight:700, color:C.muted, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:12 }}>{children}</div>

// ── Line chart ────────────────────────────────────────────────────────────────
function LineChart({ data, baseline, color, gradId, height=80 }) {
  const W=500, H=height
  const allVals = [...data, baseline]
  const min = Math.min(...allVals)*0.97, max = Math.max(...allVals)*1.03
  const cx = i => (i/(data.length-1))*W
  const cy = v => H - ((v-min)/(max-min))*H
  const linePath = data.map((v,i) => `${i===0?'M':'L'} ${cx(i).toFixed(1)} ${cy(v).toFixed(1)}`).join(' ')
  const areaPath = `M ${cx(0).toFixed(1)} ${H} ` + data.map((v,i) => `L ${cx(i).toFixed(1)} ${cy(v).toFixed(1)}`).join(' ') + ` L ${cx(data.length-1).toFixed(1)} ${H} Z`
  const bY = cy(baseline).toFixed(1)
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.22"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <line x1="0" y1={bY} x2={W} y2={bY} stroke={color} strokeWidth="1.5" strokeDasharray="5 4" opacity="0.35"/>
      <path d={areaPath} fill={`url(#${gradId})`}/>
      <path d={linePath} stroke={color} strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={cx(data.length-1)} cy={cy(data[data.length-1])} r="4" fill={color}/>
    </svg>
  )
}

// ── Alert Banner ──────────────────────────────────────────────────────────────
const ALERTS = [
  { id:1, msg:'HRV has dropped 10.3% over 5 days — sustained suppression detected.' },
  { id:2, msg:'Resting heart rate elevated +3 bpm above baseline for 4 consecutive days.' },
]
function AlertBanner() {
  const [dismissed, setDismissed] = useState([])
  const visible = ALERTS.filter(a => !dismissed.includes(a.id))
  if (!visible.length) return null
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:20, animation:'fadeUp 0.3s ease' }}>
      {visible.map(a => (
        <div key={a.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 16px', background:C.orange+'10', border:`1px solid ${C.orange}40`, borderLeft:`3px solid ${C.orange}`, borderRadius:10 }}>
          <span style={{ fontSize:14, animation:'pulse 2s ease infinite' }}>⚠</span>
          <span style={{ flex:1, fontSize:12, color:C.text, lineHeight:1.5 }}>{a.msg}</span>
          <button onClick={() => setDismissed(d => [...d,a.id])} style={{ background:'none', border:'none', color:C.muted, fontSize:18, cursor:'pointer', lineHeight:1 }}>×</button>
        </div>
      ))}
    </div>
  )
}

// ── Readiness Hero ────────────────────────────────────────────────────────────
function ReadinessHero({ fatigueInput, setFatigueInput }) {
  const status = computeReadiness(fatigueInput)
  const meta = READINESS_META[status]
  const hrvDev = ((HRV_14[HRV_14.length-1] - HRV_BASELINE) / HRV_BASELINE * 100).toFixed(1)
  const rhrDev = RHR_14[RHR_14.length-1] - RHR_BASELINE
  const signals = [
    { label:'HRV',    val:`${HRV_14[HRV_14.length-1]}ms`,  dev:`${hrvDev}%`,   col: parseFloat(hrvDev) < -8 ? C.orange : parseFloat(hrvDev) < -3 ? yellow : C.green },
    { label:'RHR',    val:`${RHR_14[RHR_14.length-1]}bpm`, dev:`+${rhrDev}bpm`, col: rhrDev > 3 ? C.orange : rhrDev > 1 ? yellow : C.green },
    { label:'Sleep',  val:`${SLEEP_7[SLEEP_7.length-1]}h`,  dev:`${(SLEEP_7[SLEEP_7.length-1]-SLEEP_BASELINE).toFixed(1)}h`, col: SLEEP_7[SLEEP_7.length-1] < 6.5 ? C.orange : SLEEP_7[SLEEP_7.length-1] < 7 ? yellow : C.green },
    { label:'A:C',    val:AC_RATIO,                          dev:`${AC_RATIO>1.3?'⚠ ':''}${AC_RATIO}`, col: AC_RATIO > 1.4 ? C.orange : AC_RATIO > 1.25 ? yellow : C.green },
  ]
  const fatigueLabels = ['','Very Fresh','Fresh','Neutral','Tired','Very Tired']
  return (
    <div style={{ background:C.card, border:`1px solid ${meta.border}`, borderRadius:14, padding:'22px 26px', position:'relative', overflow:'hidden', marginBottom:14, animation:'fadeUp 0.3s ease' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:3, background:meta.color, opacity:0.9 }} />
      <div style={{ display:'grid', gridTemplateColumns:'auto 1fr auto', gap:24, alignItems:'center' }}>
        {/* Status circle */}
        <div style={{ textAlign:'center' }}>
          <div style={{ width:80, height:80, borderRadius:'50%', background:meta.bg, border:`2px solid ${meta.color}60`, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:4 }}>
            <span style={{ fontSize:24 }}>{meta.emoji}</span>
          </div>
        </div>
        {/* Label + summary */}
        <div>
          <div style={{ fontSize:11, fontWeight:700, color:meta.color, letterSpacing:'0.12em', marginBottom:5 }}>DAILY READINESS</div>
          <div style={{ fontSize:22, fontWeight:900, color:C.text, letterSpacing:'-0.02em', marginBottom:8 }}>{meta.label}</div>
          <div style={{ fontSize:13, color:C.muted, lineHeight:1.65, maxWidth:480 }}>{meta.summary}</div>
          {/* Signal badges */}
          <div style={{ display:'flex', gap:8, marginTop:12, flexWrap:'wrap' }}>
            {signals.map(s => (
              <div key={s.label} style={{ display:'flex', alignItems:'center', gap:5, padding:'4px 10px', background:s.col+'14', border:`1px solid ${s.col}40`, borderRadius:6 }}>
                <div style={{ width:6, height:6, borderRadius:'50%', background:s.col }} />
                <span style={{ fontSize:10, color:C.muted, fontWeight:600 }}>{s.label}</span>
                <span style={{ fontSize:10, color:s.col, fontWeight:700, fontFamily:'DM Mono,monospace' }}>{s.dev}</span>
              </div>
            ))}
          </div>
        </div>
        {/* Subjective input */}
        <div style={{ minWidth:160 }}>
          <div style={{ fontSize:10, fontWeight:700, color:C.muted, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:6 }}>How do you feel?</div>
          <div style={{ fontSize:20, fontWeight:900, color:meta.color, fontFamily:'DM Mono,monospace', marginBottom:6, textAlign:'center' }}>{fatigueLabels[fatigueInput]}</div>
          <input type="range" min={1} max={5} step={1} value={fatigueInput} onChange={e => setFatigueInput(+e.target.value)} style={{ accentColor: meta.color }} />
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:9, color:C.muted, marginTop:4 }}>
            <span>Fresh</span><span>Tired</span>
          </div>
        </div>
      </div>
    </div>
  )
}

// ── Fatigue Synthesis ──────────────────────────────────────────────────────────
function FatigueSynthesis({ fatigueInput }) {
  const status = computeReadiness(fatigueInput)
  const fatigueLevels = { go:'Low Fatigue', modify:'Moderate Fatigue', rest:'High Fatigue / Overreaching Risk' }
  const fatigueColor = { go:C.green, modify:yellow, rest:C.orange }
  const factors = [
    { label:'HRV Status',   icon:'∿', detail:'−10.3% below 28-day baseline. Suppressed trend over 5 days.', pct:72, color:yellow,   status:'Suppressed' },
    { label:'RHR',          icon:'♡', detail:'+3 bpm above baseline. Rising trend over 4 days — load accumulation.', pct:60, color:yellow,   status:'Elevated'   },
    { label:'Sleep',        icon:'☽', detail:'6.9h last night vs 7.3h baseline. Marginal sleep debt detected.', pct:80, color:C.green,   status:'Adequate'   },
    { label:'Training Load',icon:'◈', detail:'A:C ratio 1.28 — approaching caution zone. Moderate acute spike.', pct:58, color:yellow,   status:'High-Normal' },
    { label:'Subjective',   icon:'◎', detail:`Self-reported: ${['','Very Fresh','Fresh','Neutral','Tired','Very Tired'][fatigueInput]}.`, pct: [100,90,75,55,35,20][fatigueInput], color:[C.green,C.green,C.green,yellow,C.orange,C.orange][fatigueInput], status:['','Very Fresh','Fresh','Neutral','Tired','Very Tired'][fatigueInput] },
  ]
  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'18px 20px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:fatigueColor[status], opacity:0.8 }} />
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <SL>Fatigue Signal Synthesis</SL>
        <div style={{ padding:'4px 12px', background:fatigueColor[status]+'18', border:`1px solid ${fatigueColor[status]}50`, borderRadius:20, fontSize:11, fontWeight:800, color:fatigueColor[status], letterSpacing:'0.04em' }}>
          {fatigueLevels[status]}
        </div>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {factors.map((f,i) => (
          <div key={i} style={{ display:'flex', alignItems:'center', gap:12 }}>
            <span style={{ fontSize:13, color:f.color, width:18, textAlign:'center', flexShrink:0 }}>{f.icon}</span>
            <div style={{ width:110, flexShrink:0 }}>
              <div style={{ fontSize:11, fontWeight:700, color:C.text }}>{f.label}</div>
              <div style={{ fontSize:9, color:f.color, fontWeight:600, marginTop:1 }}>{f.status}</div>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ height:4, background:C.subtle, borderRadius:3, overflow:'hidden' }}>
                <div style={{ height:'100%', width:`${f.pct}%`, background:f.color, borderRadius:3, opacity:0.75, transition:'width 0.5s ease' }} />
              </div>
            </div>
            <div style={{ fontSize:10, color:C.muted, lineHeight:1.4, width:200, flexShrink:0 }}>{f.detail}</div>
          </div>
        ))}
      </div>
    </div>
  )
}

// ── Training Recommendation ───────────────────────────────────────────────────
function TrainingRec({ fatigueInput }) {
  const status = computeReadiness(fatigueInput)
  const recs = TRAINING_RECS[status]
  const meta = READINESS_META[status]
  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'18px 20px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:meta.color, opacity:0.8 }} />
      <SL>Training Recommendation</SL>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {recs.map((r,i) => (
          <div key={i} style={{ padding:'12px 14px', background:C.bg, borderRadius:9, border:`1px solid ${r.label==='Avoid' ? C.orange+'40' : C.border}` }}>
            <div style={{ fontSize:10, fontWeight:700, color: r.label==='Avoid' ? C.orange : meta.color, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:5 }}>{r.label}</div>
            <div style={{ fontSize:12, color:C.text, lineHeight:1.6 }}>{r.text}</div>
          </div>
        ))}
      </div>
    </div>
  )
}

// ── Biomarker Card (HRV + RHR) ────────────────────────────────────────────────
function BiomarkerCard({ title, data14, data7, baseline, color, gradId, unit, chartDays, interpretation }) {
  const data = chartDays === 7 ? data7 : data14
  const current = data[data.length-1]
  const devAbs = current - baseline
  const devPct = ((devAbs / baseline) * 100).toFixed(1)
  const trend7 = data7[data7.length-1] - data7[0]
  const trendLabel = trend7 > 1 ? 'Improving' : trend7 < -1 ? 'Declining' : 'Stable'
  const trendColor = color === C.green || color === C.accent
    ? (trend7 > 0 ? C.green : trend7 < -1 ? C.orange : C.muted)
    : (trend7 < 0 ? C.green : trend7 > 1 ? C.orange : C.muted) // RHR: lower is better
  const devColor = color === C.green
    ? (parseFloat(devPct) < -5 ? C.orange : parseFloat(devPct) < -2 ? yellow : C.green)
    : (devAbs > 3 ? C.orange : devAbs > 1 ? yellow : C.green)

  const dayLabels = Array.from({length: data.length}, (_,i) => {
    if (i === data.length-1) return 'Today'
    const n = data.length-1-i
    return n % (chartDays === 14 ? 3 : 2) === 0 ? `-${n}d` : ''
  })

  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'18px 20px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:color, opacity:0.7 }} />
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:14 }}>
        <SL>{title}</SL>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontSize:24, fontWeight:900, color:C.text, fontFamily:'DM Mono,monospace', lineHeight:1 }}>{current}<span style={{ fontSize:11, color:C.muted, fontFamily:'Inter,sans-serif', fontWeight:500, marginLeft:3 }}>{unit}</span></div>
          <div style={{ fontSize:11, fontWeight:700, color:devColor, marginTop:3 }}>
            {devAbs > 0 ? '+' : ''}{unit === 'ms' ? `${devPct}%` : `${devAbs}${unit}`} vs baseline
          </div>
        </div>
      </div>
      <LineChart data={data} baseline={baseline} color={color} gradId={gradId} height={80} />
      {/* X axis labels */}
      <div style={{ display:'flex', justifyContent:'space-between', marginTop:5, paddingInline:2 }}>
        {dayLabels.map((l,i) => l ? <span key={i} style={{ fontSize:9, color:C.muted }}>{l}</span> : <span key={i} />)}
      </div>
      {/* Stats row */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:10, marginTop:12, paddingTop:12, borderTop:`1px solid ${C.border}` }}>
        {[
          { l:'Baseline',  v:`${baseline}${unit}`, c:C.muted },
          { l:'Deviation', v:unit==='ms' ? `${devPct}%` : `${devAbs>0?'+':''}${devAbs}${unit}`, c:devColor },
          { l:'7d Trend',  v:trendLabel, c:trendColor },
        ].map(s => (
          <div key={s.l}>
            <div style={{ fontSize:9, color:C.muted, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:4 }}>{s.l}</div>
            <div style={{ fontSize:13, fontWeight:700, color:s.c, fontFamily:'DM Mono,monospace' }}>{s.v}</div>
          </div>
        ))}
      </div>
      <div style={{ marginTop:12, paddingTop:10, borderTop:`1px solid ${C.border}`, fontSize:11, color:C.muted, lineHeight:1.6 }}>{interpretation}</div>
    </div>
  )
}

// ── Sleep Card ────────────────────────────────────────────────────────────────
function SleepCard() {
  const last = SLEEP_7[SLEEP_7.length-1]
  const avg = (SLEEP_7.reduce((a,b)=>a+b,0)/SLEEP_7.length).toFixed(1)
  const debt = (SLEEP_BASELINE - avg).toFixed(1)
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun']
  const W=500, H=80
  const max = Math.max(...SLEEP_7)*1.1
  const barW = W/SLEEP_7.length
  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'18px 20px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:C.purple, opacity:0.7 }} />
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:14 }}>
        <SL>Sleep Analysis</SL>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontSize:24, fontWeight:900, color:C.text, fontFamily:'DM Mono,monospace', lineHeight:1 }}>{last}h</div>
          <div style={{ fontSize:11, fontWeight:700, color: last < 6.5 ? C.orange : last < 7 ? yellow : C.green, marginTop:3 }}>Last night</div>
        </div>
      </div>
      {/* Bar chart */}
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        {/* Baseline line */}
        <line x1="0" y1={H-(SLEEP_BASELINE/max)*H} x2={W} y2={H-(SLEEP_BASELINE/max)*H} stroke={C.purple} strokeWidth="1.5" strokeDasharray="5 4" opacity="0.4"/>
        {SLEEP_7.map((v,i) => {
          const bh = (v/max)*H
          const col = v < 6.5 ? C.orange : v < SLEEP_BASELINE-0.3 ? yellow : C.green
          const isLast = i === SLEEP_7.length-1
          return (
            <rect key={i} x={i*barW+barW*0.1} y={H-bh} width={barW*0.8} height={bh}
              fill={col} opacity={isLast?0.9:0.5} rx="2"
              style={{ transition:'height 0.4s ease' }}
            />
          )
        })}
      </svg>
      <div style={{ display:'flex', justifyContent:'space-around', marginTop:4 }}>
        {days.map((d,i) => <span key={i} style={{ fontSize:9, color: i===SLEEP_7.length-1 ? C.text : C.muted, fontWeight: i===SLEEP_7.length-1 ? 700 : 400 }}>{d}</span>)}
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10, marginTop:12, paddingTop:12, borderTop:`1px solid ${C.border}` }}>
        {[
          { l:'Target',   v:`${SLEEP_BASELINE}h`,  c:C.muted  },
          { l:'Avg 7d',   v:`${avg}h`,              c:C.text   },
          { l:'Sleep Debt',v:`−${debt}h`,           c: parseFloat(debt) > 0.5 ? C.orange : C.green },
          { l:'Quality',  v:'Moderate',             c:yellow   },
        ].map(s => (
          <div key={s.l}>
            <div style={{ fontSize:9, color:C.muted, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:4 }}>{s.l}</div>
            <div style={{ fontSize:12, fontWeight:700, color:s.c, fontFamily:'DM Mono,monospace' }}>{s.v}</div>
          </div>
        ))}
      </div>
      <div style={{ marginTop:12, paddingTop:10, borderTop:`1px solid ${C.border}`, fontSize:11, color:C.muted, lineHeight:1.6 }}>
        Cumulative sleep debt of ~{debt}h this week. Poor sleep on Friday is disrupting HRV recovery — prioritise 8h+ tonight.
      </div>
    </div>
  )
}

// ── Load Balance Card ─────────────────────────────────────────────────────────
function LoadBalanceCard() {
  const zones = [
    { label:'Undertraining', min:0.5, max:0.8, color:C.muted    },
    { label:'Optimal',       min:0.8, max:1.3, color:C.green     },
    { label:'Caution',       min:1.3, max:1.5, color:yellow      },
    { label:'Overreaching',  min:1.5, max:2.0, color:C.orange    },
  ]
  const SCALE_MIN=0.5, SCALE_MAX=2.0
  const markerPct = ((AC_RATIO - SCALE_MIN) / (SCALE_MAX - SCALE_MIN)) * 100
  const zoneColor = AC_RATIO >= 1.5 ? C.orange : AC_RATIO >= 1.3 ? yellow : AC_RATIO >= 0.8 ? C.green : C.muted
  const zoneLabel = AC_RATIO >= 1.5 ? 'Overreaching' : AC_RATIO >= 1.3 ? 'Caution' : AC_RATIO >= 0.8 ? 'Optimal' : 'Undertraining'
  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'18px 20px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:zoneColor, opacity:0.8 }} />
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:14 }}>
        <SL>Training Load Balance</SL>
        <div style={{ textAlign:'right' }}>
          <div style={{ fontSize:24, fontWeight:900, color:zoneColor, fontFamily:'DM Mono,monospace', lineHeight:1 }}>{AC_RATIO}</div>
          <div style={{ fontSize:10, fontWeight:700, color:zoneColor, marginTop:3, letterSpacing:'0.06em' }}>{zoneLabel}</div>
        </div>
      </div>
      {/* Gauge */}
      <div style={{ position:'relative', marginBottom:10 }}>
        <div style={{ display:'flex', height:10, borderRadius:6, overflow:'hidden', gap:1 }}>
          {zones.map((z,i) => (
            <div key={i} style={{ flex: z.max - z.min, background:z.color, opacity:0.35 }} />
          ))}
        </div>
        {/* Marker */}
        <div style={{ position:'absolute', top:-3, left:`${markerPct}%`, transform:'translateX(-50%)' }}>
          <div style={{ width:0, height:0, borderLeft:'6px solid transparent', borderRight:'6px solid transparent', borderTop:`10px solid ${zoneColor}`, marginBottom:2 }} />
        </div>
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', fontSize:9, color:C.muted, marginBottom:14 }}>
        <span>0.5</span><span>0.8</span><span>1.0</span><span>1.3</span><span>1.5</span><span>2.0+</span>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, paddingTop:12, borderTop:`1px solid ${C.border}` }}>
        {[
          { l:'Acute (5d)', v:`${ACUTE_TSS} TSS`,  c:C.orange },
          { l:'Chronic (28d)', v:`${CHRONIC_TSS} TSS`, c:C.green },
          { l:'A:C Ratio',  v:AC_RATIO,              c:zoneColor },
        ].map(s => (
          <div key={s.l}>
            <div style={{ fontSize:9, color:C.muted, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:4 }}>{s.l}</div>
            <div style={{ fontSize:13, fontWeight:800, color:s.c, fontFamily:'DM Mono,monospace' }}>{s.v}</div>
          </div>
        ))}
      </div>
      <div style={{ marginTop:12, paddingTop:10, borderTop:`1px solid ${C.border}`, fontSize:11, color:C.muted, lineHeight:1.6 }}>
        A:C ratio approaching caution zone. Acute load spike this week from 2 quality sessions. Optimal zone is 0.8–1.3 — maintain without adding load.
      </div>
    </div>
  )
}

// ── Adaptive Profile ───────────────────────────────────────────────────────────
function AdaptiveProfile() {
  const confColor = { High:C.green, Medium:yellow, Low:C.orange }

  // Last session was a VO2 ride 38h ago — show the "currently recovering" callout
  const lastSession = { type:'VO2 Intervals', hoursAgo:38, expectedRecovery:40 }
  const pctRecovered = Math.min(100, Math.round((lastSession.hoursAgo / lastSession.expectedRecovery) * 100))
  const recoveryColor = pctRecovered >= 90 ? C.green : pctRecovered >= 65 ? yellow : C.orange

  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'18px 20px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:C.accent, opacity:0.7 }} />
      <SL>Your Recovery Profile</SL>

      {/* Currently recovering callout */}
      <div style={{ padding:'12px 14px', background:recoveryColor+'10', border:`1px solid ${recoveryColor}40`, borderRadius:9, marginBottom:14 }}>
        <div style={{ fontSize:10, fontWeight:700, color:recoveryColor, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:7 }}>Currently Recovering From</div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
          <div>
            <div style={{ fontSize:13, fontWeight:700, color:C.text }}>{lastSession.type}</div>
            <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>{lastSession.hoursAgo}h ago · expected full recovery in ~{lastSession.expectedRecovery}h</div>
          </div>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:20, fontWeight:900, color:recoveryColor, fontFamily:'DM Mono,monospace', lineHeight:1 }}>{pctRecovered}%</div>
            <div style={{ fontSize:9, color:C.muted, marginTop:2 }}>recovered</div>
          </div>
        </div>
        <div style={{ height:5, background:C.subtle, borderRadius:3, overflow:'hidden' }}>
          <div style={{ height:'100%', width:`${pctRecovered}%`, background:recoveryColor, borderRadius:3, transition:'width 0.6s ease' }} />
        </div>
      </div>

      {/* Per-session-type breakdown */}
      <div style={{ fontSize:10, fontWeight:700, color:C.muted, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:9 }}>Recovery Time by Session Type</div>
      <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
        {ADAPTIVE_PROFILE.map((p,i) => (
          <div key={i} style={{ padding:'11px 14px', background:C.bg, borderRadius:9, border:`1px solid ${C.border}`, display:'flex', gap:14, alignItems:'center' }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:12, fontWeight:700, color:C.text, marginBottom:3 }}>{p.type}</div>
              <div style={{ fontSize:10, color:C.muted, lineHeight:1.45 }}>{p.note}</div>
            </div>
            <div style={{ textAlign:'right', flexShrink:0 }}>
              <div style={{ fontSize:15, fontWeight:900, color:C.text, fontFamily:'DM Mono,monospace', lineHeight:1 }}>{p.recovery}</div>
              <div style={{ fontSize:8, color:C.muted, marginTop:2, textTransform:'uppercase', letterSpacing:'0.06em' }}>to recover</div>
              <div style={{ marginTop:5, padding:'2px 7px', background:confColor[p.conf]+'15', border:`1px solid ${confColor[p.conf]}40`, borderRadius:4, fontSize:8, fontWeight:700, color:confColor[p.conf], letterSpacing:'0.06em', textTransform:'uppercase' }}>{p.conf} confidence</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  )
}

// ── Readiness Drift ────────────────────────────────────────────────────────────
function ReadinessDrift() {
  const W=500, H=60
  const makeChart = (data, color, gradId) => {
    const min=Math.min(...data)*0.97, max=Math.max(...data)*1.03
    const cx=i=>(i/(data.length-1))*W
    const cy=v=>H-((v-min)/(max-min))*H
    const path=data.map((v,i)=>`${i===0?'M':'L'} ${cx(i).toFixed()} ${cy(v).toFixed()}`).join(' ')
    const area=`M ${cx(0)} ${H} `+data.map((v,i)=>`L ${cx(i).toFixed()} ${cy(v).toFixed()}`).join(' ')+` L ${cx(data.length-1)} ${H} Z`
    return { path, area, cx, cy, current:data[data.length-1], delta:data[data.length-1]-data[0], gradId }
  }
  const hrv = makeChart(DRIFT_HRV, C.green, 'driftHrv')
  const rhr = makeChart(DRIFT_RHR, C.accent, 'driftRhr')

  const renderMini = ({ path, area, cx, cy, current, delta, gradId }, data, color, label, unit, goodDir) => {
    const improved = goodDir === 'up' ? delta > 0 : delta < 0
    return (
      <div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:8 }}>
          <div style={{ fontSize:11, fontWeight:700, color:C.muted, letterSpacing:'0.08em', textTransform:'uppercase' }}>{label}</div>
          <div style={{ fontSize:12, fontFamily:'DM Mono,monospace', fontWeight:700, color: improved ? C.green : C.orange }}>
            {goodDir==='up' ? (delta>0?'+':'') : (delta<0?'':'+')}{Math.abs(delta)}{unit}
            <span style={{ fontSize:9, color:C.muted, fontWeight:400, marginLeft:5 }}>8 weeks</span>
          </div>
        </div>
        <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.2"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={area} fill={`url(#${gradId})`}/>
          <path d={path} stroke={color} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
          <circle cx={cx(data.length-1)} cy={cy(data[data.length-1])} r="3.5" fill={color}/>
        </svg>
        <div style={{ display:'flex', justifyContent:'space-between', marginTop:4, fontSize:9, color:C.muted }}>
          <span>8 weeks ago</span><span>Now</span>
        </div>
      </div>
    )
  }

  return (
    <div style={{ background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:'18px 20px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:0, left:0, right:0, height:2, background:`linear-gradient(90deg,${C.green},${C.accent})`, opacity:0.7 }} />
      <SL>Readiness Drift (8-week baseline)</SL>
      <div style={{ fontSize:11, color:C.muted, marginBottom:16, lineHeight:1.6 }}>
        Baseline values show <span style={{ color:C.green, fontWeight:700 }}>improving aerobic fitness</span> — HRV trending up, RHR trending down over the block.
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
        {renderMini(hrv, DRIFT_HRV, C.green, 'Baseline HRV', 'ms', 'up')}
        {renderMini(rhr, DRIFT_RHR, C.accent, 'Baseline RHR', 'bpm', 'down')}
      </div>
      <div style={{ marginTop:14, paddingTop:12, borderTop:`1px solid ${C.border}`, padding:'12px 14px 0', background:'none' }}>
        <div style={{ fontSize:10, fontWeight:700, color:C.accent, letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:6 }}>Fatigue Tolerance</div>
        <div style={{ fontSize:11, color:C.muted, lineHeight:1.65 }}>
          HRV baseline has risen +4ms over 8 weeks — indicating improving aerobic adaptation. Short-term suppression is expected and manageable; it does not represent declining fitness.
        </div>
      </div>
    </div>
  )
}

// ── Tweaks ────────────────────────────────────────────────────────────────────
function TweaksPanel({ tweaks, setTweaks, visible }) {
  if (!visible) return null
  return (
    <div style={{ position:'fixed', bottom:24, right:24, zIndex:500, background:C.card, border:`1px solid ${C.border}`, borderRadius:14, padding:20, width:252, boxShadow:'0 8px 40px rgba(0,0,0,0.55)', animation:'fadeUp 0.2s ease' }}>
      <div style={{ fontSize:11, fontWeight:800, color:C.text, marginBottom:14, letterSpacing:'0.08em' }}>TWEAKS</div>
      <div style={{ marginBottom:14 }}>
        <div style={{ fontSize:11, color:C.muted, marginBottom:6 }}>Chart window</div>
        <div style={{ display:'flex', gap:6 }}>
          {[7,14].map(d => (
            <button key={d} onClick={() => setTweaks(t=>({...t,chartDays:d}))} style={{ flex:1, padding:'7px 0', borderRadius:8, border:`1px solid ${tweaks.chartDays===d?C.accent:C.border}`, background:tweaks.chartDays===d?C.accentDim:'none', color:tweaks.chartDays===d?C.accent:C.muted, fontSize:12, fontWeight:700, cursor:'pointer', fontFamily:'Inter,sans-serif', transition:'all 0.15s' }}>{d} days</button>
          ))}
        </div>
      </div>
      {[
        { key:'showDriftTracking',   label:'Show Readiness Drift' },
        { key:'showAdaptiveProfile', label:'Show Adaptive Profile' },
      ].map(({ key, label }) => (
        <div key={key} style={{ display:'flex', alignItems:'center', gap:9, marginBottom:10, cursor:'pointer' }} onClick={() => setTweaks(t=>({...t,[key]:!t[key]}))}>
          <div style={{ width:34, height:18, borderRadius:10, background:tweaks[key]?C.accent:C.subtle, position:'relative', transition:'background 0.2s', flexShrink:0 }}>
            <div style={{ position:'absolute', top:2, left:tweaks[key]?18:2, width:14, height:14, borderRadius:'50%', background:tweaks[key]?'#000':C.muted, transition:'left 0.2s' }} />
          </div>
          <span style={{ fontSize:11, color:C.muted }}>{label}</span>
        </div>
      ))}
    </div>
  )
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS)
  const [tweaksVisible, setTweaksVisible] = useState(false)
  const [fatigueInput, setFatigueInput] = useState(3)

  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksVisible(true)
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false)
    }
    window.addEventListener('message', handler)
    window.parent.postMessage({ type:'__edit_mode_available' }, '*')
    return () => window.removeEventListener('message', handler)
  }, [])

  useEffect(() => {
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:tweaks }, '*')
  }, [tweaks])

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar />
      <div style={{ flex:1, overflow:'auto', padding:'28px 32px', minWidth:0 }}>
        <div style={{ marginBottom:22 }}>
          <div style={{ fontSize:28, fontWeight:900, color:C.text, letterSpacing:'-0.03em', lineHeight:1.1 }}>Health & Recovery</div>
          <div style={{ fontSize:13, color:C.muted, marginTop:5, fontWeight:500 }}>
            Today · {new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' })}
          </div>
        </div>

        <AlertBanner />
        <ReadinessHero fatigueInput={fatigueInput} setFatigueInput={setFatigueInput} />

        <div style={{ display:'grid', gridTemplateColumns:'58% 1fr', gap:14, marginBottom:14 }}>
          <FatigueSynthesis fatigueInput={fatigueInput} />
          <TrainingRec fatigueInput={fatigueInput} />
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'58% 1fr', gap:14, marginBottom:14 }}>
          <BiomarkerCard
            title="HRV Trend" data14={HRV_14} data7={HRV_7} baseline={HRV_BASELINE}
            color={C.green} gradId="gradHrv" unit="ms" chartDays={tweaks.chartDays}
            interpretation="Suppressed HRV trend over 5 days — consistent decline toward lower bound. HRV is 10.3% below 28-day baseline. Directional trend: Declining."
          />
          <SleepCard />
        </div>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14 }}>
          <BiomarkerCard
            title="Resting Heart Rate" data14={RHR_14} data7={RHR_7} baseline={RHR_BASELINE}
            color={C.orange} gradId="gradRhr" unit="bpm" chartDays={tweaks.chartDays}
            interpretation="RHR elevated +3 bpm above baseline for 4 days. Rising trend indicates accumulating fatigue. Stable low RHR = good recovery; this reading suggests residual stress."
          />
          <LoadBalanceCard />
        </div>

        {(tweaks.showAdaptiveProfile || tweaks.showDriftTracking) && (
          <div style={{ display:'grid', gridTemplateColumns:'58% 1fr', gap:14 }}>
            {tweaks.showAdaptiveProfile && <AdaptiveProfile />}
            {tweaks.showDriftTracking && <ReadinessDrift />}
          </div>
        )}
      </div>

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} />
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
